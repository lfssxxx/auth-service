services:
  auth-service-postgres:
    image: postgres:18.1-bookworm
    container_name: auth-service-postgres
    environment: 
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    restart: always
    env_file:
      - .env

  auth-service-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
    env_file:
      - .env

  auth-service-port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: auth-service-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:auth-service-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  pgdata: